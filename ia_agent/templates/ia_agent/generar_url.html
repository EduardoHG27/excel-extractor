{% extends "base.html" %}

{% block title %}Generar desde URL{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h3>Generar Casos desde URL</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">URL del requerimiento:</label>
                            <input type="url" name="url" class="form-control" 
                                   placeholder="https://ejemplo.com/requerimiento" required>
                            <div class="form-text">
                                Ingrese la URL de una página web que contenga el requerimiento a analizar.
                                El sistema extraerá el contenido automáticamente.
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-globe"></i> Extraer y Generar
                            </button>
                            <a href="{% url 'ia_agent:ver_casos_todos' %}" class="btn btn-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
